name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install web dependencies
        run: npm ci
        working-directory: web

      - name: Install pipeline dependencies
        run: |
          pip install uv
          cd pipeline && uv sync

      - name: Install Tippecanoe
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libsqlite3-dev zlib1g-dev
          git clone https://github.com/felt/tippecanoe.git /tmp/tippecanoe
          cd /tmp/tippecanoe && make -j$(nproc) && sudo make install

      - name: Generate PMTiles and national Parquet
        run: |
          cd pipeline
          for metro in dfw chicago nyc; do
            uv run python -m urbanstack.cli export --metro $metro
          done
          uv run python -m urbanstack.cli national

      - name: Upload exports to R2
        run: |
          for f in pipeline/exports/*.pmtiles pipeline/exports/*.parquet; do
            [ -f "$f" ] && npx wrangler r2 object put "urbanstack/exports/$(basename $f)" --file "$f" --remote
          done
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}

      - name: Build static export
        run: npm run build
        working-directory: web
        env:
          NEXT_PUBLIC_BASE_PATH: /urbanstack
          NEXT_PUBLIC_TOMTOM_API_KEY: ${{ secrets.NEXT_PUBLIC_TOMTOM_API_KEY }}
          NEXT_PUBLIC_R2_URL: https://pub-67ffcc9780314ab6a2cb7c45ad6398eb.r2.dev/exports

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
